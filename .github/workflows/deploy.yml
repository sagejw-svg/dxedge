name: Deploy DXEdge

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          NODE_OPTIONS: --max-old-space-size=2048

      - name: Detect what changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -qE '^backend/|^nginx/|^docker-compose'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy built frontend to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/opt/dxedge/frontend/dist/"
          strip_components: 2

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: BACKEND_CHANGED=${{ steps.changes.outputs.backend }}
          script: |
            set -e
            cd /opt/dxedge
            LOG=/var/log/dxedge_deploy.log
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] GitHub Actions deploy starting" >> $LOG
            git pull origin main
            if [ "$BACKEND_CHANGED" = "true" ]; then
              echo "[$(date)] Backend changed - rebuilding container" >> $LOG
              docker compose build --no-cache backend
              docker compose up -d
            else
              echo "[$(date)] Frontend-only - restarting nginx" >> $LOG
              docker compose restart nginx
            fi
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] Deploy complete: $(git rev-parse --short HEAD)" >> $LOG

      - name: Verify health
        run: |
          sleep 8
          curl -sf https://dxedge.net/api/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'Health: {d[\"status\"]} | SFI={d[\"sfi\"]} | spots={d[\"spots\"]}')
          assert d['status'] == 'ok', 'Health check failed'
          "
