events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name dxedge.net www.dxedge.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name dxedge.net www.dxedge.net;

        ssl_certificate     /etc/letsencrypt/live/dxedge.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dxedge.net/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        # API - proxy to FastAPI
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # LoTW can be slow - give it more time
        location /api/lotw {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
        }

        location /ws/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Frontend static files - served by FastAPI fallthrough
        location / {
            proxy_pass       http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cache hashed JS/CSS assets forever (Vite adds content hash)
            location ~* \.(js|css|woff2)$ {
                proxy_pass http://backend:8000;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            # Cache static assets - shorter TTL for non-hashed files
            location ~* \.(png|svg|ico|json)$ {
                proxy_pass http://backend:8000;
                expires 7d;
                add_header Cache-Control "public, max-age=604800";
            }
        }
    }
}
